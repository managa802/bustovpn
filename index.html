<!DOCTYPE html>
<html>
<head>

        body {

            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .box {
            background: #1a2335;
            padding: 40px;
            border-radius: 30px;
            border: 1px solid #2b7aff44;
        }
        h1 {
            font-size: 48px;
            background: linear-gradient(to right, #f0f7ff, #b6d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn {
            display: inline-block;
            padding: 14px 40px;
            margin: 10px;
            border-radius: 60px;
            background: #2b7aff;
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:hover {
            background: #408aff;
        }
        .red { color: #ff6b6b; }
        .gold { color: #fbbf24; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🛡️ BustoVPN</h1>
        <p style="color:#8bb8ff;">🔥 РАБОТАЕТ!</p>
        <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank" class="btn">⬇️ Скачать</a>
        <br>
        <p style="color:#4f6a92;margin-top:16px;">
            ❤️ Сделано <span class="gold">Амирчиком</span><br>
            🐶 Его друг <span class="red">Данил — лох!</span> 🤣
        </p>
    </div>
</body>
</html>
